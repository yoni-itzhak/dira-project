name: Petah Tikva permit watcher

on:
  workflow_dispatch:
    inputs:
      force_notify:
        description: Create a notification issue even if nothing changed
        required: false
        default: false
        type: boolean
  issues:
    types: [opened]
  schedule:
    - cron: '17 8 * * *'
      timezone: 'Asia/Jerusalem'

permissions:
  contents: write
  issues: write

concurrency:
  group: petah-tikva-permit-watch
  cancel-in-progress: false

jobs:
  check-permits:
    if: github.event_name != 'issues' || github.event.issue.title == '[permit-watch-run]'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: permit-watch
        run: npm install --no-audit --no-fund

      - name: Install Chromium
        working-directory: permit-watch
        run: npx playwright install --with-deps chromium

      - name: Check permit requests
        id: watcher
        working-directory: permit-watch
        env:
          FORCE_NOTIFY: ${{ github.event_name == 'issues' || inputs.force_notify }}
          BROWSERBASE_API_KEY: ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('watch.mjs')
          source = path.read_text()

          page_needle = "  const page = await context.newPage();\n"
          page_replacement = """  const page = await context.newPage();
            await page.route('**/*', async (route) => {
              const request = route.request();
              if (request.resourceType() === 'stylesheet' || /\\.css(?:[?#]|$)/i.test(request.url())) {
                await route.fulfill({ status: 200, contentType: 'text/css', body: '' });
              } else {
                await route.continue();
              }
            });
          """
          if page_needle not in source:
              raise SystemExit('Could not install stylesheet-timeout workaround')
          source = source.replace(page_needle, page_replacement, 1)

          proxy_needle = "    proxies: true,\n"
          proxy_replacement = """    proxies: [{
              type: 'browserbase',
              geolocation: { country: 'IL' },
            }],
          """
          if proxy_needle not in source:
              raise SystemExit('Could not configure Browserbase Israeli proxy')
          source = source.replace(proxy_needle, proxy_replacement, 1)

          error_needle = "    if (!content.text.includes(target.requestId)) throw new Error(`Request ${target.requestId} was not visible after the page loaded.`);\n"
          error_replacement = """    if (!content.text.includes(target.requestId)) {
              const frameUrls = content.frames.map((frame) => frame.url).join(', ');
              const visibleText = content.text.slice(-1500).replace(/\\n/g, ' | ');
              throw new Error(`Request ${target.requestId} was not visible. Final URL: ${page.url()}. Title: ${await page.title()}. Frames: ${frameUrls}. Visible text: ${visibleText}`);
            }
          """
          if error_needle not in source:
              raise SystemExit('Could not install detailed error reporting')
          source = source.replace(error_needle, error_replacement, 1)
          path.write_text(source)
          PY
          node watch.mjs
        continue-on-error: true

      - name: Upload screenshots and report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: permit-watch-${{ github.run_number }}
          path: |
            permit-watch/artifacts/
            permit-watch/report.md
            permit-watch/result.json
          if-no-files-found: warn
          retention-days: 30

      - name: Commit new snapshots
        if: always()
        run: |
          if [ -z "$(git status --porcelain -- permit-watch/state)" ]; then
            echo "No snapshot changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add permit-watch/state
          git commit -m "Update permit watcher snapshots"
          git push

      - name: Create notification issue
        if: steps.watcher.outputs.should_notify == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          CHANGED_IDS: ${{ steps.watcher.outputs.changed_ids }}
          HAS_NEW_ERRORS: ${{ steps.watcher.outputs.has_new_errors }}
        run: |
          if [ "$HAS_NEW_ERRORS" = "true" ]; then
            TITLE="Permit watcher needs attention"
          elif [ -n "$CHANGED_IDS" ]; then
            TITLE="Permit update detected: $CHANGED_IDS"
          else
            TITLE="Permit watcher test notification"
          fi
          {
            echo "Workflow run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            cat permit-watch/report.md
          } > permit-watch/report-with-run.md
          gh issue create \
            --title "$TITLE" \
            --body-file permit-watch/report-with-run.md \
            --assignee "${{ github.repository_owner }}"

      - name: Close API trigger issue
        if: github.event_name == 'issues'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue close "${{ github.event.issue.number }}" --comment "Permit watcher run completed."
